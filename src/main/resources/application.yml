server:
  port: 8080

spring:
  application:
    name: commerce-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/commerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  redis:
    host: localhost
    port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

springdoc:
  swagger-ui:
    path: /swagger

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG